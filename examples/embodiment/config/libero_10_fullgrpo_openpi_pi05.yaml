# FullGRPO Configuration for LIBERO-10 with OpenPi Pi0.5
# FullGRPO: ReGRPO on original rollout (all chunks) + SeGRPO on rewrite rollout (suffix only)
# This configuration uses the real LIBERO simulator (no world model) with state save/restore

defaults:
  - env/libero_10@env.train
  - env/libero_10@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "libero_10_fullgrpo_openpi_pi05"
    logger_backends: ["tensorboard"]

  max_epochs: 1000
  max_steps: -1

  only_eval: False
  val_check_interval: -1
  save_interval: 10

  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 8
  reward_coef: 1.0
  rollout_epoch: 1
  eval_rollout_epoch: 1

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: token_level
  update_epoch: 4

  # FullGRPO advantage type
  adv_type: fullgrpo
  loss_type: actor
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  # FullGRPO specific parameters for real env rewrite
  regrpo:
    num_rewrite: 8 # Number of rewrites per trajectory (reduced for real env)
    success_threshold: 0.5 # Threshold for success determination
    min_prefix_chunks: 1 # Minimum prefix chunks (t_clip >= min_prefix_chunks)
    max_prefix_chunks: 15 # No task completes within 5 chunks (~50 steps), so t_clip<=5 guarantees pre-success state; gives policy max remaining steps for diversity
    flip_rate_temperature: 1.0 # Temperature for fallback estimated flip rate
    max_amp: 3.0 # Max amplification of regrpo chunk weight vs vanilla GRPO
    alpha: 0.1 # Modulation: 0=vanilla GRPO, 1=full FullGRPO redistribution

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

  filter_rewards: True
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 64
    max_episode_steps: 480
    max_steps_per_rollout_epoch: 480
    reward_coef: ${algorithm.reward_coef}
    group_size: ${algorithm.group_size}
  eval:
    total_num_envs: 500
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 480
    max_steps_per_rollout_epoch: 480
    group_size: 1
    use_fixed_reset_state_ids: True
    is_eval: True
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_10
  enable_offload: False
  pipeline_stage_num: 1

  model:
    model_path: "/inspire/ssd/project/robotsimulation/zhangchenxi-253108310322/code/model/RLinf-Pi05-LIBERO-130-fullshot-SFT"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 128
  global_batch_size: 1024
  seed: 42
  enable_offload: False

  model:
    model_path: "/inspire/ssd/project/robotsimulation/zhangchenxi-253108310322/code/model/RLinf-Pi05-LIBERO-130-fullshot-SFT"
    num_steps: 4

  optim:
    lr: 5.0e-6
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    clip_grad: 1.0
    weight_decay: 0.01

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
